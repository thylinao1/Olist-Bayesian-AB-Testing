name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal test dependencies
        # We deliberately do NOT install the full requirements.txt here.
        # PyMC, ArviZ, nutpie, DuckDB are heavy and unnecessary for the
        # unit-test layer. The integration tests in tests/test_etl_integration.py
        # need DuckDB and the built warehouse - they auto-skip when the
        # warehouse isn't present, which is the CI default.
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            pymc>=5.10.0 arviz>=0.17.0 numpy>=1.26.0 pandas>=2.2.0 \
            scipy>=1.12.0 statsmodels>=0.14.0 networkx>=3.2 \
            duckdb>=1.0.0 pytest>=7.0

      - name: Run pytest (unit tests only; integration tests auto-skip)
        run: pytest tests/ -v --tb=short

      - name: Run smoke test
        # Belt-and-suspenders: even if pytest passes, the smoke_test script
        # checks the full module-import graph and the public APIs of every
        # model factory. Catches integration bugs the unit tests might miss.
        run: python scripts/smoke_test.py
